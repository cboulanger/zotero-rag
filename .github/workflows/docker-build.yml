name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: branch name + commit SHA)'
        required: false
        default: ''
      local_models:
        description: 'Include sentence-transformers/torch (~1-2 GB extra)'
        type: boolean
        required: false
        default: false
      no_ocr:
        description: 'Exclude Tesseract OCR (smaller image)'
        type: boolean
        required: false
        default: false

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
            TAG="latest"
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')
            SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="${BRANCH}-${SHA}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:${{ steps.tag.outputs.tag }}
          build-args: |
            INSTALL_LOCAL_MODELS=${{ inputs.local_models || 'false' }}
            INSTALL_OCR=${{ inputs.no_ocr == 'true' && 'false' || 'true' }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:buildcache,mode=max

      - name: Print image reference
        run: |
          echo "Pushed: ${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:${{ steps.tag.outputs.tag }}"
          echo "Pull with:"
          echo "  docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:${{ steps.tag.outputs.tag }}"
