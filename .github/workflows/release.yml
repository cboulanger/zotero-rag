name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run if CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ github.actor }}
          GIT_COMMITTER_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: npx semantic-release

  update-tags:
    name: Update Dynamic Tags
    runs-on: ubuntu-latest
    needs: release
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update latest and stable tags
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Get the most recent version tag (exit gracefully if no tags exist)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Only update if a tag exists and it's not a pre-release (no hyphen)
          if [[ -n "$LATEST_TAG" && ! "$LATEST_TAG" =~ - ]]; then
            echo "Updating latest and stable tags to $LATEST_TAG"
            git tag -f latest
            git tag -f stable
            git push origin latest --force
            git push origin stable --force
          else
            echo "No version tags found or latest tag is a pre-release. Skipping tag update."
          fi

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Checkout latest main so we get the version-bumped commit from semantic-release
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:buildcache,mode=max

      - name: Print image reference
        run: |
          echo "Pushed: ${{ secrets.DOCKER_HUB_USERNAME }}/zotero-rag:latest"
