# Local development / self-hosted deployment
#
# Services:
#   zotero-rag  — FastAPI backend (port 8119)
#   kreuzberg   — Document extraction sidecar (port 8100, internal only)
#
# Usage:
#   docker compose up          # start both containers
#   docker compose up -d       # start in background
#   docker compose down        # stop and remove containers
#   docker compose logs -f     # stream logs from all services
#
# Required environment variables (set in .env or shell):
#   MODEL_PRESET     — e.g. remote-openai, remote-kisski
#   OPENAI_API_KEY   — required for remote-openai preset
#   KISSKI_API_KEY   — required for remote-kisski / apple-silicon-kisski

services:
  kreuzberg:
    image: ghcr.io/kreuzberg-dev/kreuzberg:latest
    restart: unless-stopped
    # No ports exposed to host — only the app service needs to reach it
    networks:
      - internal

  zotero-rag:
    image: ${ZOTERO_RAG_IMAGE:-cboulanger/zotero-rag:latest}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8119}:8119"
    volumes:
      - "${DATA_DIR:-./data}:/data"
    environment:
      KREUZBERG_URL: http://kreuzberg:8100
      MODEL_PRESET: ${MODEL_PRESET:-remote-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KISSKI_API_KEY: ${KISSKI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ZOTERO_API_URL: ${ZOTERO_API_URL:-http://host.docker.internal:23119}
      REQUIRE_ZOTERO: ${REQUIRE_ZOTERO:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_KEY: ${API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    extra_hosts:
      # Allows the container to reach Zotero running on the host (Linux)
      - "host.docker.internal:host-gateway"
    depends_on:
      - kreuzberg
    networks:
      - internal

networks:
  internal:
    driver: bridge
