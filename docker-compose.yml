# Example compose file for local development / self-hosted deployment
#
# Services:
#   zotero-rag  — FastAPI backend (port 8119)
#   kreuzberg   — Document extraction sidecar (port 8100, internal only)
#   qdrant      — Vector database server (port 6333, internal only)
#
# Usage:
#   docker compose up          # start all containers
#   docker compose up -d       # start in background
#   docker compose down        # stop and remove containers
#   docker compose logs -f     # stream logs from all services
#
# Required environment variables (set in .env or shell):
#   OPENAI_API_KEY    — required for remote-openai preset
#   KISSKI_API_KEY    — required for kisski / academiccloud presets
#   HF_TOKEN          — optional, for gated Hugging Face models

services:
  kreuzberg:
    image: ghcr.io/kreuzberg-dev/kreuzberg:latest
    restart: unless-stopped
    # No ports exposed to host — only the app service needs to reach it
    networks:
      - internal

  qdrant:
    image: docker.io/qdrant/qdrant:v1.15
    restart: unless-stopped
    volumes:
      - "${DATA_DIR:-./data}/qdrant-server:/qdrant/storage"
    # No ports exposed to host — only the app service needs to reach it
    networks:
      - internal
    healthcheck:
      test: ["CMD", "grep", "-q", ":18BD ", "/proc/net/tcp"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  zotero-rag:
    image: ${ZOTERO_RAG_IMAGE:-cboulanger/zotero-rag:latest}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8119}:8119"
    volumes:
      - "${DATA_DIR:-./data}:/data"
    environment:
      KREUZBERG_URL: http://kreuzberg:8100
      QDRANT_URL: http://qdrant:6333
      MODEL_PRESET: ${MODEL_PRESET:-remote-openai}
      # API keys — set whichever your MODEL_PRESET requires
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KISSKI_API_KEY: ${KISSKI_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      # set a secret api key for a real deployment!
      API_KEY: ${API_KEY:-}
      DATA_PATH: /data
      # Path to public libraries config inside the container (e.g. /data/public-libraries.json)
      PUBLIC_LIBRARIES_CONFIG: ${PUBLIC_LIBRARIES_CONFIG:-}
      #ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-"*"}
    depends_on:
      kreuzberg:
        condition: service_started
      qdrant:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
