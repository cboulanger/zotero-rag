<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul">

<head>
  <title>Fix Unavailable Attachments - Zotero RAG</title>
  <meta charset="utf-8"/>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      try {
        Services.scriptloader.loadSubScript(
          "chrome://zotero/content/include.js",
          this
        );
      } catch (e) {
        console.error("Failed to load include.js:", e);
      }
      try {
        Services.scriptloader.loadSubScript(
          "chrome://zotero-rag/content/fix-unavailable.js",
          window
        );
      } catch (e) {
        console.error("Failed to load fix-unavailable.js:", e);
      }
    });
  </script>
  <style>
    body { margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; height: 100vh; overflow: hidden; box-sizing: border-box; }
    .dialog-container { display: flex; flex-direction: column; height: 100%; }
    .dialog-header { margin-bottom: 12px; flex-shrink: 0; }
    .dialog-header p { margin: 0; color: #555; font-size: 12px; line-height: 1.5; }
    .table-wrapper { flex: 1; overflow-y: auto; border: 1px solid #ccc; border-radius: 4px; min-height: 0; position: relative; }
    #items-table { width: 100%; }
    .table-row { display: flex; width: 100%; box-sizing: border-box; }
    .header-row { position: sticky; top: 0; background: #f0f0f0; border-bottom: 1px solid #ccc; font-weight: 600; z-index: 1; }
    .header-row > div { padding: 6px 8px; overflow: hidden; white-space: nowrap; display: flex; align-items: center; }
    #items-tbody .table-row:nth-child(even) { background: #fafafa; }
    #items-tbody .table-row > div { padding: 5px 8px; border-bottom: 1px solid #eee; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: flex; align-items: center; }
    /* Fixed-width columns */
    .col-check    { flex: 0 0 28px; justify-content: center; overflow: visible !important; }
    .col-year     { flex: 0 0 44px; }
    .col-key      { flex: 0 0 80px; }
    .col-type     { flex: 0 0 50px; }
    .col-select   { flex: 0 0 32px; justify-content: center; overflow: visible !important; }
    /* Flexible columns */
    .col-author   { flex: 2 1 0; min-width: 0; }
    .col-title    { flex: 4 1 0; min-width: 0; }
    .col-filename { flex: 2 1 0; min-width: 0; font-size: 11px; color: #666; }
    .col-status   { flex: 2 1 0; min-width: 0; }
    .select-btn { background: none; border: none; padding: 0 2px; cursor: pointer; font-size: 12px; color: #666; line-height: 1; }
    .select-btn:hover { color: #0066cc; }
    .refresh-btn { background: none; border: none; padding: 0; cursor: pointer; font-size: 13px; color: #888; line-height: 1; }
    .refresh-btn:hover { color: #0066cc; }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status-cell { font-size: 11px; }
    .status-cell.found    { color: #008000; }
    .status-cell.fixed    { color: #006600; font-weight: 600; }
    .status-cell.not-found { color: #999; }
    .status-cell.error    { color: #cc0000; }
    .status-cell.searching { color: #0066cc; }
    .status-bar { margin-top: 8px; font-size: 11px; color: #666; flex-shrink: 0; min-height: 16px; }
    .dialog-buttons { display: flex; justify-content: flex-end; gap: 8px; padding-top: 12px; border-top: 1px solid #ddd; flex-shrink: 0; }
    .dialog-button { padding: 6px 16px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; color: #333; cursor: pointer; font-family: inherit; font-size: 13px; }
    .dialog-button:hover { background: #e5e5e5; }
    .dialog-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .dialog-button.primary { background: #0066cc; color: #fff; border-color: #0066cc; }
    .dialog-button.primary:hover { background: #0052a3; }
    .dialog-button.primary:disabled { opacity: 0.5; cursor: not-allowed; background: #0066cc; }
    .dialog-button.danger { background: #f5f5f5; color: #cc0000; border-color: #cc0000; }
    .dialog-button.danger:hover { background: #cc0000; color: #fff; }
    .dialog-button.danger:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>

<body>
  <div class="dialog-container">

    <div class="dialog-header">
      <p>
        The following items have attachment files that are missing locally, usually due to incomplete
        synchronisation. This tool applies a number of strategies to find the missing file.
      </p>
    </div>

    <div class="table-wrapper">
      <div id="items-table">
        <div class="table-row header-row">
          <div class="col-check"><input type="checkbox" id="header-checkbox" title="Toggle all"/></div>
          <div class="col-author">Author(s)</div>
          <div class="col-year">Year</div>
          <div class="col-title">Title</div>
          <div class="col-key">Zotero ID</div>
          <div class="col-filename">Filename</div>
          <div class="col-type">Type</div>
          <div class="col-status">Status</div>
          <div class="col-select"><button id="refresh-btn" class="refresh-btn" title="Refresh list">↻</button></div>
        </div>
        <div id="items-tbody">
          <!-- Rows populated by fix-unavailable.js -->
        </div>
      </div>
    </div>

    <div id="status-bar" class="status-bar"></div>

    <div class="dialog-buttons">
      <button id="close-btn" type="button" class="dialog-button">Close</button>
      <button id="delete-btn" type="button" class="dialog-button danger" disabled="true">Delete Selected</button>
      <button id="search-btn" type="button" class="dialog-button primary" disabled="true">Search &amp; Fix Selected</button>
    </div>
  </div>
</body>
</html>
