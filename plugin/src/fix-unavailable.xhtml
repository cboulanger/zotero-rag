<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero-react-client.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul">

<head>
  <title>Fix Unavailable Attachments - Zotero RAG</title>
  <meta charset="utf-8"/>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      try {
        Services.scriptloader.loadSubScript(
          "chrome://zotero/content/include.js",
          window
        );
      } catch (e) {
        console.error("Failed to load include.js:", e);
      }
      try {
        Services.scriptloader.loadSubScript(
          "chrome://zotero-rag/content/toolkit.bundle.js",
          window
        );
      } catch (e) {
        console.error("Failed to load toolkit.bundle.js:", e);
      }
      try {
        Services.scriptloader.loadSubScript(
          "chrome://zotero-rag/content/fix-unavailable.js",
          window
        );
      } catch (e) {
        console.error("Failed to load fix-unavailable.js:", e);
      }
    });
  </script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; }
    .dialog-container { display: flex; flex-direction: column; height: 100%; padding: 12px 12px 0; box-sizing: border-box; }
    .dialog-header { flex-shrink: 0; margin-bottom: 8px; }
    .dialog-header p { margin: 0; color: #555; font-size: 12px; line-height: 1.5; }
    #library-header { font-weight: bold; color: #333; margin: 0 0 4px 0; font-size: 13px; }
    /* Container for the VirtualizedTable — must have a definite height */
    #table-container { flex: 1; min-height: 0; overflow: auto; border: 1px solid #ccc; border-radius: 4px; }
    #table-container .virtualized-table-header { position: sticky; top: 0; z-index: 1; }
    /* Status colour classes applied to the cell element inside the table */
    .status-fixed    { color: #006600; font-weight: 600; }
    .status-not-found { color: #999; }
    .status-error    { color: #cc0000; }
    .status-searching { color: #0066cc; }
    /* Inline action button inside the select column */
    .select-btn { background: none; border: none; padding: 0 2px; cursor: pointer; font-size: 12px; color: #666; line-height: 1; }
    .select-btn:hover { color: #0066cc; }
    /* Toolbar above the VirtualizedTable */
    #table-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; flex-shrink: 0; }
    #table-toolbar label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #555; cursor: pointer; user-select: none; }
    .toolbar-btn { padding: 2px 10px; border: 1px solid #ccc; border-radius: 3px; background: #f5f5f5; color: #333; cursor: pointer; font-family: inherit; font-size: 12px; }
    .toolbar-btn:hover { background: #e5e5e5; }
    .toolbar-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Button bar — status text left, action buttons right */
    .dialog-buttons { display: flex; align-items: center; gap: 8px; padding: 10px 0 12px; border-top: 1px solid #ddd; flex-shrink: 0; }
    #status-bar { flex: 1; font-size: 11px; color: #666; min-height: 15px; }
    .dialog-button { padding: 6px 16px; min-height: 32px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; color: #333; cursor: pointer; font-family: inherit; font-size: 13px; }
    .dialog-button:hover { background: #e5e5e5; }
    .dialog-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .dialog-button.primary { background: #0066cc; color: #fff; border-color: #0066cc; }
    .dialog-button.primary:hover { background: #0052a3; }
    .dialog-button.primary:disabled { opacity: 0.5; cursor: not-allowed; background: #0066cc; }
    .dialog-button.danger { background: #f5f5f5; color: #cc0000; border-color: #cc0000; }
    .dialog-button.danger:hover { background: #cc0000; color: #fff; }
    .dialog-button.danger:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>

<body>
  <div class="dialog-container">

    <div class="dialog-header">
      <p id="library-header"></p>
      <p>
        The following items have attachment files that are missing locally, usually due to incomplete
        synchronisation. This tool applies a number of strategies to find the missing file.
        Use the checkboxes to select items (all pre-selected). Click &#x1F50D; to locate the item in Zotero.
      </p>
    </div>

    <!-- Toolbar: select-all toggle + refresh -->
    <div id="table-toolbar">
      <label><input type="checkbox" id="select-all-cb"/> Select all</label>
      <button id="refresh-btn" type="button" class="toolbar-btn" title="Reload the list of missing files">Refresh</button>
    </div>

    <!-- VirtualizedTable renders itself here -->
    <div id="table-container"></div>

    <div class="dialog-buttons">
      <div id="status-bar"></div>
      <button id="close-btn" type="button" class="dialog-button">Close</button>
      <button id="delete-btn" type="button" class="dialog-button danger" disabled="true">Delete Selected</button>
      <button id="search-btn" type="button" class="dialog-button primary" disabled="true">Search &amp; Fix Selected</button>
    </div>
  </div>
</body>
</html>
