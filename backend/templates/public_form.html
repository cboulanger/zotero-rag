<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — Zotero RAG</title>
<style>
  body { font-family: Georgia, serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
  .description { color: #555; margin-bottom: 2rem; }
  textarea { width: 100%; box-sizing: border-box; padding: 0.6rem; font-size: 1rem;
             font-family: inherit; border: 1px solid #ccc; border-radius: 4px;
             resize: vertical; min-height: 80px; }
  button { margin-top: 0.75rem; padding: 0.5rem 1.4rem; font-size: 1rem;
           background: #1a5c9e; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #154d85; }
  nav { font-size: 0.85rem; margin-top: 2rem; }
  nav a { color: #1a5c9e; }
</style>
</head>
<body>
<h1>{{ title }}</h1>
<p class="description">{{ description }}</p>
<form method="POST">
  <label for="question"><strong>Ask a question about this library:</strong></label><br><br>
  <textarea id="question" name="question" placeholder="{{ placeholder or 'e.g. What are the main findings on this topic?' }}" required>{{ question or '' }}</textarea><br>
  <button type="submit">Ask</button>
</form>
{% if error %}
<p style="color:#c00; margin-top:1rem;"><strong>Error:</strong> {{ error }}</p>
{% endif %}
<nav><a href="/public/">&#8592; All libraries</a></nav>
</body>
</html>
